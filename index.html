<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>迷你世界 0.52.1 - 星辉之门</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --sky:#3FB8EF;
    --sky-deep:#1E82C4;
    --grass:#5FCB5A;
    --grass-deep:#3B9E36;
    --sun:#FFD23F;
    --sun-deep:#F2A900;
    --ink:#173A5E;
    --cream:#FFF8E7;
    --panel:#0E2A46;
    --tg:#37AEE2;
    --tg-deep:#1E7FB8;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans SC', sans-serif;
    color:var(--ink);
    background:
      linear-gradient(180deg, rgba(10,30,55,.35), rgba(10,30,55,.55)),
      url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRd1F2_EbtI881dHPsiX_-OfcpoXZca427gvDIXTmLaXp6sIaGhcxtjgQI&s=10') center/cover fixed no-repeat;
    min-height:100%;
    overflow-x:hidden;
  }

  /* ---------- MODE TOGGLE ---------- */
  .mode-toggle{
    position:fixed; top:14px; right:16px; z-index:100;
    background:var(--panel);
    color:var(--sun);
    border:3px solid var(--sun);
    border-radius:24px;
    padding:9px 18px;
    font-family:'ZCOOL KuaiLe', sans-serif;
    font-size:14px;
    cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,.35);
    user-select:none;
    transition:transform .1s;
  }
  .mode-toggle:active{ transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.35); }

  /* ---------- HEADER (mobile/default) ---------- */
  header{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:14px;
    padding:10px 22px;
    background:linear-gradient(180deg, var(--panel), #0a1f36);
    border-bottom:5px solid var(--sun);
    box-shadow:0 4px 0 rgba(0,0,0,.25);
  }
  header img.logo{
    width:52px; height:52px; border-radius:12px;
    border:3px solid var(--sun);
    box-shadow:0 3px 0 var(--sun-deep);
    object-fit:cover;
  }
  header .brand{
    font-family:'ZCOOL KuaiLe', sans-serif;
    color:var(--cream);
    line-height:1.15;
  }
  header .brand .b1{ font-size:22px; letter-spacing:1px; text-shadow:2px 2px 0 var(--sky-deep);}
  header .brand .b2{ font-size:12px; color:var(--sun); opacity:.9;}

  /* ---------- NEWS TICKER ---------- */
  .ticker-wrap{
    position:relative;
    background:repeating-linear-gradient(45deg, var(--sun) 0 18px, var(--sun-deep) 18px 36px);
    border-top:3px solid #fff;
    border-bottom:3px solid #fff;
    height:40px;
    overflow:hidden;
    box-shadow:inset 0 0 0 2px rgba(0,0,0,.1);
  }
  .ticker-wrap::before{
    content:"最新公告";
    position:absolute; left:0; top:0; bottom:0;
    display:flex; align-items:center;
    padding:0 14px;
    font-family:'ZCOOL KuaiLe', sans-serif;
    font-size:14px;
    color:#fff;
    background:var(--grass-deep);
    box-shadow:3px 0 6px rgba(0,0,0,.25);
    z-index:2;
  }
  .ticker-track{
    position:absolute; top:0; left:0; height:100%;
    display:flex; align-items:center;
    white-space:nowrap;
    animation:slide 16s linear infinite;
    padding-left:100%;
    font-weight:700;
    color:var(--panel);
    font-size:15px;
    text-shadow:1px 1px 0 rgba(255,255,255,.4);
  }
  @keyframes slide{
    0%{ transform:translateX(0); }
    100%{ transform:translateX(200%); }
  }

  /* ---------- HERO ---------- */
  .hero{
    text-align:center;
    padding:46px 20px 30px;
  }
  .hero h1{
    font-family:'ZCOOL KuaiLe', sans-serif;
    font-size:clamp(32px, 6vw, 58px);
    color:var(--cream);
    -webkit-text-stroke:2px var(--sky-deep);
    text-shadow:4px 4px 0 var(--grass-deep), 0 0 30px rgba(0,0,0,.4);
    letter-spacing:2px;
  }
  .hero p{
    margin-top:10px;
    color:var(--cream);
    font-size:16px;
    background:rgba(14,42,70,.55);
    display:inline-block;
    padding:8px 18px;
    border-radius:20px;
    border:2px solid var(--sun);
  }

  /* ---------- SECTION TITLE ---------- */
  .section-title{
    text-align:center;
    font-family:'ZCOOL KuaiLe', sans-serif;
    font-size:26px;
    color:var(--cream);
    margin:40px 0 18px;
    text-shadow:2px 2px 0 var(--sky-deep);
  }
  .section-title::before, .section-title::after{
    content:"◆";
    color:var(--sun);
    margin:0 10px;
    font-size:14px;
  }

  /* ---------- CAROUSEL (mobile) ---------- */
  .carousel{
    max-width:760px;
    margin:0 auto 20px;
    position:relative;
    border:6px solid var(--cream);
    border-radius:16px;
    box-shadow:0 10px 0 rgba(0,0,0,.3), 0 12px 30px rgba(0,0,0,.4);
    overflow:hidden;
    background:#000;
  }
  .carousel-track{
    display:flex;
    transition:transform .5s cubic-bezier(.65,0,.35,1);
    height:min(56vw, 420px);
  }
  .carousel-track img{
    width:100%; flex-shrink:0; height:100%; object-fit:cover;
  }
  .car-btn{
    position:absolute; top:50%; transform:translateY(-50%);
    background:var(--sun); color:var(--panel);
    border:3px solid #fff; border-radius:50%;
    width:42px; height:42px; font-size:20px; font-weight:900;
    cursor:pointer; box-shadow:0 3px 0 var(--sun-deep);
    display:flex; align-items:center; justify-content:center;
  }
  .car-btn:hover{ background:#fff; }
  .car-prev{ left:12px; } .car-next{ right:12px; }
  .dots{
    display:flex; justify-content:center; gap:10px; margin-top:14px;
  }
  .dot{
    width:14px; height:14px; border-radius:4px;
    background:var(--panel); border:2px solid var(--cream);
    cursor:pointer; opacity:.6;
    transition:.2s;
  }
  .dot.active{ background:var(--sun); opacity:1; transform:scale(1.15); }

  /* ---------- GALLERY GRID (pc only) ---------- */
  .gallery-grid{
    display:none;
    max-width:1040px;
    margin:0 auto 10px;
    grid-template-columns:repeat(2, 1fr);
    gap:18px;
    padding:0 20px;
  }
  .gallery-grid figure{
    position:relative; margin:0; overflow:hidden;
    border:5px solid var(--cream); border-radius:14px;
    box-shadow:0 8px 0 rgba(0,0,0,.3);
  }
  .gallery-grid img{
    width:100%; height:260px; object-fit:cover; display:block;
    transition:transform .35s ease;
  }
  .gallery-grid figure:hover img{ transform:scale(1.08); }
  .gallery-grid figcaption{
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(0deg, rgba(0,0,0,.65), transparent);
    color:#fff; font-size:13px; padding:16px 12px 8px;
    font-family:'ZCOOL KuaiLe', sans-serif;
  }

  /* ---------- DOWNLOADS ---------- */
  .downloads{
    display:flex; flex-wrap:wrap; justify-content:center; gap:22px;
    padding:20px 20px 60px;
  }
  .dl-btn{
    display:flex; align-items:center; gap:12px;
    text-decoration:none;
    padding:16px 30px;
    border-radius:14px;
    font-family:'ZCOOL KuaiLe', sans-serif;
    font-size:20px;
    color:#fff;
    border:3px solid rgba(255,255,255,.85);
    box-shadow:0 6px 0 rgba(0,0,0,.35);
    transition:transform .12s ease;
    min-width:230px;
    justify-content:center;
  }
  .dl-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.35); }
  .dl-btn small{
    display:block; font-family:'Noto Sans SC',sans-serif; font-size:11px; font-weight:400; opacity:.85;
  }
  .dl-android{ background:linear-gradient(180deg, var(--grass), var(--grass-deep)); }
  .dl-windows{ background:linear-gradient(180deg, var(--sky), var(--sky-deep)); }
  .dl-telegram{ background:linear-gradient(180deg, var(--tg), var(--tg-deep)); }
  .dl-btn svg{ width:30px; height:30px; flex-shrink:0; }

  footer{
    text-align:center;
    padding:18px;
    color:var(--cream);
    font-size:12px;
    background:rgba(10,25,45,.6);
  }

  @media (max-width:480px){
    header .brand .b1{ font-size:18px; }
    .hero p{ font-size:13px; }
    .dl-btn{ min-width:200px; font-size:17px; padding:14px 20px;}
  }

  /* =========================================================
     PC MODE — отдельный интерфейс "лаунчера" для компьютера
     ========================================================= */
  body.pc-mode{
    display:flex;
    min-height:100vh;
  }
  body.pc-mode .site{
    display:flex;
    width:100%;
  }

  /* Боковая панель вместо шапки */
  body.pc-mode header{
    position:fixed; top:0; left:0; bottom:0; z-index:60;
    width:250px; height:100vh;
    flex-direction:column; align-items:flex-start;
    gap:18px;
    padding:30px 22px;
    border-bottom:none;
    border-right:5px solid var(--sun);
    box-shadow:6px 0 0 rgba(0,0,0,.25);
  }
  body.pc-mode header img.logo{ width:74px; height:74px; }
  body.pc-mode header .brand .b1{ font-size:24px; }
  body.pc-mode .pc-nav{
    display:flex; flex-direction:column; gap:6px;
    margin-top:20px; width:100%;
  }
  body.pc-mode .pc-nav a{
    color:var(--cream); text-decoration:none;
    font-size:14px; padding:10px 14px;
    border-radius:10px;
    background:rgba(255,255,255,.06);
    border-left:4px solid transparent;
    transition:.15s;
  }
  body.pc-mode .pc-nav a:hover{
    background:rgba(255,255,255,.14);
    border-left-color:var(--sun);
  }
  body.pc-mode .pc-status{
    margin-top:auto;
    font-size:11px;
    color:var(--sun);
    background:rgba(0,0,0,.25);
    padding:8px 10px;
    border-radius:8px;
    line-height:1.6;
    width:100%;
  }

  /* Основной контент сдвигается вправо от сайдбара */
  body.pc-mode main{
    margin-left:250px;
    width:calc(100% - 250px);
  }
  body.pc-mode .ticker-wrap{ margin-left:0; }

  /* Hero становится широким блоком с описанием слева */

  body.pc-mode .hero p{ display:block; margin-top:16px; }
  body.pc-mode .hero-badge{

    border-radius:16px;
    padding:20px 26px;
    box-shadow:0 8px 0 var(--sun-deep);
    font-size:18px;
    text-align:center;
    transform:rotate(-3deg);
  }
  body.pc-mode .hero-badge b{ display:block; font-size:30px; }

  /* Показываем сетку скриншотов, прячем карусель */
  body.pc-mode .carousel{ display:none; }
  body.pc-mode .gallery-grid{ display:grid; }

  /* Кнопки скачивания — панель лаунчера */
  body.pc-mode .downloads{
    max-width:1100px; margin:0 auto;
    justify-content:flex-start;
    background:rgba(14,42,70,.55);
    border-radius:18px;
    padding:26px;
    border:2px solid rgba(255,255,255,.15);
  }
  body.pc-mode .dl-btn{ min-width:260px; }

  @media (max-width:900px){
    body.pc-mode header{ position:relative; width:100%; height:auto; flex-direction:row; padding:14px 20px; }
    body.pc-mode .pc-nav{ display:none; }
    body.pc-mode main{ margin-left:0; width:100%; }
    body.pc-mode .hero{ flex-direction:column; text-align:center; }
    body.pc-mode .gallery-grid{ grid-template-columns:1fr; }
  }
</style>
</head>

<script>
  // ---------- Carousel (mobile) ----------
  const track = document.getElementById('carTrack');
  const imgs = track.children.length;
  let idx = 0;
  const dotsWrap = document.getElementById('dots');
  for(let i=0;i<imgs;i++){
    const d = document.createElement('div');
    d.className = 'dot' + (i===0 ? ' active' : '');
    d.onclick = () => { idx = i; render(); };
    dotsWrap.appendChild(d);
  }
  function render(){
    track.style.transform = `translateX(-${idx*100}%)`;
    [...dotsWrap.children].forEach((d,i)=> d.classList.toggle('active', i===idx));
  }
  function moveCar(dir){
    idx = (idx + dir + imgs) % imgs;
    render();
  }
  setInterval(()=> { if(!document.body.classList.contains('pc-mode')) moveCar(1); }, 4000);

  // ---------- PC / Mobile mode toggle ----------
  const toggleBtn = document.getElementById('modeToggle');
  function applyMode(isPc){
    document.body.classList.toggle('pc-mode', isPc);
    toggleBtn.textContent = isPc ? '📱 手机版界面' : '🖥️ 电脑版界面';
  }
  toggleBtn.addEventListener('click', () => {
    applyMode(!document.body.classList.contains('pc-mode'));
  });
  // По умолчанию на широких экранах сразу открываем ПК-интерфейс
  applyMode(window.innerWidth > 1000);
</script>
